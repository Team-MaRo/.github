<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Team MaRo - a Mount Fuji night scene with a red rising sun and rocket on the left and blue-green plants on the right">
  <title>Team MaRo</title>
  <defs>
    <!-- Sky: red on the left blending into blue-green on the right -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#3b0d18" />
      <stop offset="28%" stop-color="#6e1322" />
      <stop offset="50%" stop-color="#2a2350" />
      <stop offset="74%" stop-color="#0e4d52" />
      <stop offset="100%" stop-color="#0a6155" />
    </linearGradient>
    <!-- Darken the top so the stars read -->
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05010a" stop-opacity="0.85" />
      <stop offset="55%" stop-color="#05010a" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9b0" />
      <stop offset="35%" stop-color="#ff7b4a" />
      <stop offset="75%" stop-color="#e01f3d" />
      <stop offset="100%" stop-color="#b00020" />
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5a3c" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ff5a3c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="fuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4f72" />
      <stop offset="100%" stop-color="#1c2740" />
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0c6b5a" />
      <stop offset="100%" stop-color="#37c9a6" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0a12" />
      <stop offset="55%" stop-color="#0e1326" />
      <stop offset="100%" stop-color="#06241f" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="400" fill="url(#sky)" />
  <rect width="1280" height="400" fill="url(#dusk)" />

  <!-- Stars (twinkling) -->
  <g fill="#fef6f0">
    <circle cx="90" cy="60" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0s" repeatCount="indefinite" /></circle>
    <circle cx="160" cy="120" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite" /></circle>
    <circle cx="240" cy="50" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0.2s" repeatCount="indefinite" /></circle>
    <circle cx="330" cy="90" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="1.1s" repeatCount="indefinite" /></circle>
    <circle cx="420" cy="40" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" begin="0.9s" repeatCount="indefinite" /></circle>
    <circle cx="500" cy="110" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.4s" repeatCount="indefinite" /></circle>
    <circle cx="610" cy="60" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" begin="1.4s" repeatCount="indefinite" /></circle>
    <circle cx="700" cy="100" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" begin="0.7s" repeatCount="indefinite" /></circle>
    <circle cx="790" cy="45" r="1.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="0.3s" repeatCount="indefinite" /></circle>
    <circle cx="880" cy="120" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="1.0s" repeatCount="indefinite" /></circle>
    <circle cx="960" cy="70" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.5s" repeatCount="indefinite" /></circle>
    <circle cx="1040" cy="40" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="1.3s" repeatCount="indefinite" /></circle>
    <circle cx="1110" cy="105" r="1.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" begin="0.1s" repeatCount="indefinite" /></circle>
    <circle cx="1190" cy="65" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" begin="0.8s" repeatCount="indefinite" /></circle>
    <circle cx="1240" cy="130" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" begin="1.5s" repeatCount="indefinite" /></circle>
  </g>

  <!-- Rising sun (red) -->
  <circle cx="250" cy="150" r="135" fill="url(#sunGlow)">
    <animate attributeName="r" values="135;150;135" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="250" cy="150" r="72" fill="url(#sun)" />

  <!-- Distant ridge behind Fuji -->
  <path d="M0,330 Q 220,290 460,318 T 900,310 T 1280,322 L1280,400 L0,400 Z" fill="#13182e" opacity="0.85" />

  <!-- Mount Fuji -->
  <g>
    <path d="M360,348 Q 520,300 598,196 Q 624,140 640,130 Q 656,140 682,196 Q 760,300 920,348 Z" fill="url(#fuji)" />
    <!-- snow cap -->
    <path d="M598,196 Q 624,140 640,130 Q 656,140 682,196 Q 668,188 658,202 Q 648,192 640,206 Q 632,192 622,202 Q 612,188 598,196 Z" fill="#eef5fa" />
  </g>

  <!-- Rocket ascending -->
  <g transform="translate(150,300)">
    <animateTransform attributeName="transform" type="translate" values="150,302; 156,288; 150,302" dur="4s" repeatCount="indefinite" />
    <!-- exhaust trail -->
    <path d="M-3,22 Q 0,70 3,22 Z" fill="#ff8a3d" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="0.4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1 0.7;1 1.3;1 0.7" dur="0.4s" repeatCount="indefinite" additive="sum" />
    </path>
    <!-- fins -->
    <path d="M-6,12 L-13,26 L-6,22 Z" fill="#c2102f" />
    <path d="M6,12 L13,26 L6,22 Z" fill="#c2102f" />
    <!-- body -->
    <path d="M0,-30 C9,-18 9,4 6,20 L-6,20 C-9,4 -9,-18 0,-30 Z" fill="#f5f7fb" />
    <!-- nose -->
    <path d="M0,-30 C6,-22 8,-12 8,-6 L-8,-6 C-8,-12 -6,-22 0,-30 Z" fill="#e01f3d" />
    <!-- window -->
    <circle cx="0" cy="-2" r="4.5" fill="#7fd4e8" stroke="#2a566b" stroke-width="1.5" />
  </g>

  <!-- Foreground ground -->
  <path d="M0,360 Q 320,338 640,356 T 1280,352 L1280,400 L0,400 Z" fill="url(#ground)" />

  <!-- Plants (blue-green) lower right, gentle sway -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-2.5 1110 396; 2.5 1110 396; -2.5 1110 396" dur="5s" repeatCount="indefinite" />
    <path d="M1110,396 C1102,344 1072,318 1040,310 C1078,326 1096,358 1110,396 Z" fill="url(#leaf)" />
    <path d="M1110,396 C1118,340 1150,316 1184,308 C1146,326 1126,358 1110,396 Z" fill="url(#leaf)" />
    <path d="M1110,396 C1108,346 1110,318 1112,294 C1116,322 1118,358 1110,396 Z" fill="#2aa787" />
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="2 1212 398; -2 1212 398; 2 1212 398" dur="6s" repeatCount="indefinite" />
    <path d="M1212,398 C1207,366 1190,350 1170,344 C1194,354 1205,376 1212,398 Z" fill="url(#leaf)" />
    <path d="M1212,398 C1217,366 1236,352 1256,346 C1234,356 1222,378 1212,398 Z" fill="url(#leaf)" />
  </g>

  <!-- Wordmark -->
  <text x="640" y="362" text-anchor="middle" font-family="'Segoe UI', 'Yu Gothic', 'Meiryo', 'Hiragino Kaku Gothic ProN', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="3" fill="#0a0207" opacity="0.45">Team MaRo マロ</text>
  <text x="640" y="360" text-anchor="middle" font-family="'Segoe UI', 'Yu Gothic', 'Meiryo', 'Hiragino Kaku Gothic ProN', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="3" fill="#fdeef0">Team MaRo <tspan fill="#7fe6cf">マロ</tspan></text>
</svg>
